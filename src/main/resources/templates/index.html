<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad Mini</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 24px;
            color: #2c3e50;
        }

        /* Create note form */
        .form-card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            max-width: 700px;
        }

        .form-card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #3498db;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .btn-create {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-create:hover { background: #2980b9; }

        /* Notes list */
        .notes-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #2c3e50;
        }

        .empty-msg {
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }

        .note-card {
            background: white;
            border-radius: 8px;
            padding: 18px 20px;
            margin-bottom: 14px;
            max-width: 700px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .note-content { flex: 1; }

        .note-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #2c3e50;
        }

        .note-body {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .note-date {
            font-size: 11px;
            color: #aaa;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

<h1>📝 Notepad Mini</h1>

<!-- Create Note Form -->
<div class="form-card">
    <h2>New Note</h2>
    <form th:action="@{/notes}" th:object="${newNote}" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}" placeholder="Note title" required />
        </div>
        <div class="form-group">
            <label for="body">Body</label>
            <textarea id="body" th:field="*{body}" placeholder="Write your note here..." required></textarea>
        </div>
        <button type="submit" class="btn-create">Save Note</button>
    </form>
</div>

<!-- Notes List -->
<div class="notes-section">
    <h2>All Notes</h2>

    <p class="empty-msg" th:if="${#lists.isEmpty(notes)}">No notes yet. Create one above!</p>

    <div class="note-card" th:each="note : ${notes}">
        <div class="note-content">
            <div class="note-title" th:text="${note.title}"></div>
            <div class="note-body" th:text="${note.body}"></div>
            <div class="note-date" th:text="${#temporals.format(note.createdAt, 'dd MMM yyyy, HH:mm')}"></div>
        </div>
        <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post">
            <button type="submit" class="btn-delete">Delete</button>
        </form>
    </div>
</div>

</body>
</html>
