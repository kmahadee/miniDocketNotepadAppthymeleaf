secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt


services:

  db:
    image: postgres:16-alpine
    secrets:
      - db_user
      - db_password
    environment:
        POSTGRES_DB: notesdb
        POSTGRES_USER_FILE: /run/secrets/db_user         # ← was ${DB_USER}
        POSTGRES_PASSWORD_FILE: /run/secrets/db_password # ← was ${DB_PASSWORD}

    #    environment:
#      POSTGRES_DB: notesdb
#      POSTGRES_USER: ${DB_USER}
#      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
#      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d notesdb"]
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d notesdb"]

      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager  # keeps DB on one stable node
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  app:
    image: notepadmini-app:latest  # ⚠️ Swarm can't build — pre-build this image
    expose:
      - "8080"
    secrets:
      - db_user
      - db_password
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/notesdb
      SPRING_DATASOURCE_USERNAME: notesuser
      SPRING_DATASOURCE_PASSWORD: notespass


    #    environment:
#      DB_USER: ${DB_USER}
#      DB_PASSWORD: ${DB_PASSWORD}
#      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/notesdb
    networks:
      - app-net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1       # rolling update: 1 at a time
        delay: 10s
        failure_action: rollback

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    networks:
      - app-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  app-net:
    driver: overlay  # overlay is required for Swarm (spans nodes)
    name: notepadmini-app-net
volumes:
  postgres-data:

configs:
  nginx_config:
    file: ./nginx.conf












